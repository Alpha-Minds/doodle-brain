name: doodle_brain
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # المكتبات المدمجة (تم جمع كودك مع كودهم)
  flutter_bloc: ^9.1.1
  hive_flutter: ^1.1.0
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    # الأصول الخاصة بك (الصور والواجهة)
    - lib/assets/background.jpeg
    - lib/assets/battle.png
    - lib/assets/game-store.png
    - lib/assets/shop.png
    - lib/assets/store.png
    - lib/assets/inventory.png
    - lib/assets/profile.png
    - lib/assets/coins.png
    - lib/assets/home.png
    - lib/assets/image.png
    - lib/assets/center.png
    - lib/assets/char.png

    # الأصول الخاصة بهم (البيانات والجرافيكس الجديد)
    - lib/assets/data/items.json
    - lib/assets/data/questions/
    - lib/assets/graphics/character/
    - lib/assets/graphics/weapons/
    - lib/assets/graphics/enemies/
